# Gateway zero-trust — métadonnées uniquement.
# Aucune persistance ni traitement de PII. Voir sidecar/docker-compose.yml
# pour la stack à déployer sur chaque machine utilisateur (NER + mappings).

services:
  gateway:
    build: ./gateway
    ports:
      - "8001:8000"
    environment:
      POSTGRES_DSN: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/anondb
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      ADMIN_SECRET: ${ADMIN_SECRET:-changeme}
      # Phase 4.6 — clé de signature des JWT OAuth émis par /oauth/token.
      # En production : utiliser un secret fort (32+ bytes random) géré par
      # le secret manager interne, ou bypasser /oauth/token en faisant
      # pointer OAUTH_JWKS_URL vers Azure AD pour validation externe.
      OAUTH_SIGNING_KEY: ${OAUTH_SIGNING_KEY:-dev-signing-key-CHANGEME-32bytes-min}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anondb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [internal]

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [gateway]
    networks: [internal]

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
