<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Masque — démo zero-trust</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #ffffff;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #656d76;
    --ok: #1f883d;
    --warn: #cf222e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
    background: var(--bg); color: var(--text);
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
  h1 { margin: 0; font-size: 20px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 14px; margin-top: -20px; }

  .toggle {
    border: none; cursor: pointer;
    width: 420px; max-width: 90vw; padding: 48px 24px;
    border-radius: 16px; font-family: inherit;
    font-size: 32px; font-weight: 700; letter-spacing: 0.5px;
    color: #fff; transition: background 0.15s, transform 0.05s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .toggle:active { transform: translateY(1px); }

  /* masque LEVÉ = vrais noms visibles (état normal) */
  .toggle.levé    { background: var(--ok); }
  /* masque MIS = jetons (les vrais noms n'existent que localement) */
  .toggle.mis     { background: var(--warn); }
  .toggle.unknown { background: var(--muted); }

  .toggle .state { display: block; font-size: 15px; font-weight: 500; opacity: 0.9; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
  .toggle .hint  { display: block; font-size: 13px; font-weight: 400; opacity: 0.85; margin-top: 14px; }

  .status { font-size: 12px; color: var(--muted); font-family: "SF Mono", Menlo, monospace; }
  .status.err { color: var(--warn); }
</style>
</head>
<body>

<h1>🎭 Interrupteur masque</h1>
<div class="sub">Démo zero-trust — bascule l'affichage de la <b>prochaine</b> réponse Claude</div>

<button class="toggle unknown" id="toggle">
  <span class="state" id="state">connexion…</span>
  <span id="label">—</span>
  <span class="hint" id="hint"></span>
</button>

<div class="status" id="status"></div>

<script>
  const SIDECAR = 'http://127.0.0.1:8787';
  const btn = document.getElementById('toggle');
  const stateEl = document.getElementById('state');
  const labelEl = document.getElementById('label');
  const hintEl = document.getElementById('hint');
  const statusEl = document.getElementById('status');

  // on = true  → masque MIS  → jetons à l'écran
  // on = false → masque LEVÉ → vrais noms à l'écran (normal)
  function render(on) {
    if (on) {
      btn.className = 'toggle mis';
      stateEl.textContent = 'Masque MIS';
      labelEl.textContent = '[PERSONNE_1]';
      hintEl.textContent = 'Anthropic ne voit QUE ça — cliquez pour lever le masque';
    } else {
      btn.className = 'toggle levé';
      stateEl.textContent = 'Masque levé';
      labelEl.textContent = 'Dubois, Müller…';
      hintEl.textContent = 'Vrais noms reconstitués localement — cliquez pour masquer';
    }
  }

  async function refresh() {
    try {
      const r = await fetch(`${SIDECAR}/demo/mask`);
      const d = await r.json();
      render(d.on);
      statusEl.className = 'status';
      statusEl.textContent = `connecté à ${SIDECAR}`;
    } catch (e) {
      statusEl.className = 'status err';
      statusEl.textContent = `sidecar injoignable (${SIDECAR}) — démarre-le`;
      btn.className = 'toggle unknown';
      stateEl.textContent = 'déconnecté';
      labelEl.textContent = '—';
      hintEl.textContent = '';
    }
  }

  btn.addEventListener('click', async () => {
    try {
      const cur = await (await fetch(`${SIDECAR}/demo/mask`)).json();
      const next = !cur.on;
      const r = await fetch(`${SIDECAR}/demo/mask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ on: next }),
      });
      const d = await r.json();
      render(d.on);
    } catch (e) {
      statusEl.className = 'status err';
      statusEl.textContent = 'échec — sidecar injoignable';
    }
  });

  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
