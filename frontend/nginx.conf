server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index admin.html;
        try_files $uri $uri/ /admin.html;
    }

    # Admin endpoints stay on the gateway (metadata only).
    # /api/* used to be proxied here too — but in the zero-trust model
    # the user frontend talks directly to the local sidecar on 127.0.0.1.
    location /admin/ {
        proxy_pass http://gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTPS reverse proxy pour le sidecar.
# Les sidecars appellent le gateway en HTTPS pour :
# - /api/kb/snapshot (KB metadata)
# - /api/classify_column (classification qwen3)
# - /api/audit (audit log)
# - /oauth/token (OAuth M2M)
#
# Les certs sont générés par mkcert et montés depuis ../certs/
# Voir scripts/setup_https.sh
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;

    # TLS moderne uniquement
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy vers le gateway pour toutes les routes API
    location / {
        proxy_pass http://gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
